<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8" />

  <meta name="viewport"
        content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />

  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Min telefon" />

  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0b1220" />

  <title>Min telefon</title>

  <style>
    :root{
      --bg:#0b1220;
      --card:rgba(255,255,255,.08);
      --card2:rgba(255,255,255,.12);
      --text:#fff;
      --muted:rgba(255,255,255,.75);
      --stroke:rgba(255,255,255,.14);
      --radius:22px;
      --shadow:0 10px 26px rgba(0,0,0,.35);
      --green:#27d17c;
      --red:#ff5a5a;
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      height:100%;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;
      background:
        radial-gradient(1200px 800px at 50% 0%, rgba(80,140,255,.22), transparent 55%),
        var(--bg);
      color:var(--text);
      overscroll-behavior:none;
      touch-action:manipulation;
    }

    body{overflow:hidden}

    .app{
      height:100dvh;
      padding:calc(12px + env(safe-area-inset-top)) 12px calc(12px + env(safe-area-inset-bottom));
      display:flex;
      flex-direction:column;
      gap:12px;
      max-width:900px;
      margin:auto;
    }

    header{
      text-align:center;
    }

    h1{
      margin:0;
      font-size:clamp(24px,6vw,34px);
    }

    .hint{
      margin:6px 0 0;
      color:var(--muted);
      font-size:15px;
    }

    .topButtons{
      display:flex;
      gap:10px;
      justify-content:center;
      margin-top:10px;
    }

    button{
      border:0;
      border-radius:14px;
      padding:12px 14px;
      font-size:16px;
      font-weight:900;
      cursor:pointer;
    }

    .addBtn{
      background:var(--green);
      color:#062012;
    }

    .editBtn{
      background:rgba(255,255,255,.14);
      color:white;
      border:1px solid var(--stroke);
    }

    .grid{
      flex:1;
      min-height:0;
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:14px;
      overflow:auto;
      padding-bottom:10px;
    }

    .card{
      background:linear-gradient(180deg,var(--card2),var(--card));
      border:1px solid var(--stroke);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:12px;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:space-between;
      min-height:230px;
      -webkit-tap-highlight-color:transparent;
    }

    .card:active{transform:scale(.985)}

    .avatar{
      width:min(150px,34vw);
      aspect-ratio:1;
      border-radius:999px;
      background:rgba(255,255,255,.10);
      border:1px solid var(--stroke);
      overflow:hidden;
      display:grid;
      place-items:center;
      font-size:50px;
      font-weight:900;
    }

    .avatar img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }

    .name{
      margin:10px 0 3px;
      font-size:clamp(18px,4.6vw,22px);
      font-weight:900;
      text-align:center;
    }

    .phone{
      margin:0;
      color:var(--muted);
      font-size:14px;
      text-align:center;
    }

    .tag{
      margin-top:10px;
      padding:9px 13px;
      border-radius:999px;
      font-weight:900;
      font-size:14px;
      border:1px solid transparent;
    }

    .tag.open{
      background:rgba(39,209,124,.14);
      border-color:rgba(39,209,124,.35);
      color:#bfffe0;
    }

    .tag.closed{
      background:rgba(255,90,90,.14);
      border-color:rgba(255,90,90,.35);
      color:#ffd0d0;
    }

    .empty{
      grid-column:1 / -1;
      text-align:center;
      color:var(--muted);
      padding:40px 20px;
      border:1px dashed var(--stroke);
      border-radius:var(--radius);
    }

    .modalBackdrop{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.72);
      display:none;
      align-items:center;
      justify-content:center;
      padding:18px;
      z-index:9999;
    }

    .modalBackdrop.show{display:flex}

    .modal{
      width:min(520px,94vw);
      max-height:90dvh;
      overflow:auto;
      background:#0b1220;
      border:1px solid var(--stroke);
      border-radius:22px;
      padding:18px;
      box-shadow:0 18px 50px rgba(0,0,0,.55);
    }

    .modal h2{
      margin:0 0 14px;
      text-align:center;
    }

    label{
      display:block;
      margin:12px 0 6px;
      font-weight:800;
    }

    input{
      width:100%;
      border:1px solid var(--stroke);
      background:rgba(255,255,255,.10);
      color:white;
      padding:13px;
      border-radius:14px;
      font-size:17px;
    }

    input[type="file"]{
      padding:10px;
    }

    .row{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .modalBtns{
      display:flex;
      gap:10px;
      margin-top:16px;
    }

    .saveBtn{
      flex:1;
      background:var(--green);
      color:#062012;
    }

    .cancelBtn{
      flex:1;
      background:rgba(255,255,255,.14);
      color:white;
      border:1px solid var(--stroke);
    }

    .dangerBtn{
      width:100%;
      margin-top:10px;
      background:rgba(255,90,90,.18);
      color:#ffd0d0;
      border:1px solid rgba(255,90,90,.35);
    }

    .listItem{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      padding:10px;
      border:1px solid var(--stroke);
      border-radius:14px;
      margin-top:10px;
      background:rgba(255,255,255,.06);
    }

    .smallBtn{
      padding:9px 10px;
      font-size:14px;
    }

    @media(max-width:370px){
      .grid{gap:10px}
      .card{padding:10px; min-height:210px}
    }
  </style>
</head>

<body>
<div class="app">
  <header>
    <h1>Min telefon</h1>
    <p class="hint">Tryk på et billede for at ringe</p>

    <div class="topButtons">
      <button class="addBtn" id="openAddBtn">+ Opret person</button>
      <button class="editBtn" id="openManageBtn">Rediger</button>
    </div>
  </header>

  <main class="grid" id="contactGrid"></main>
</div>

<!-- Opret / rediger modal -->
<div class="modalBackdrop" id="formModal">
  <div class="modal">
    <h2 id="formTitle">Opret person</h2>

    <input type="hidden" id="editId">

    <label>Navn</label>
    <input id="nameInput" type="text" placeholder="Fx Mor">

    <label>Telefonnummer</label>
    <input id="phoneInput" type="tel" placeholder="Fx +4512345678">

    <label>Billede</label>
    <input id="imageInput" type="file" accept="image/*">

    <div class="row">
      <div>
        <label>Spærret fra</label>
        <input id="blockStartInput" type="time" value="22:00">
      </div>
      <div>
        <label>Spærret til</label>
        <input id="blockEndInput" type="time" value="08:00">
      </div>
    </div>

    <div class="modalBtns">
      <button class="saveBtn" id="saveBtn">Gem</button>
      <button class="cancelBtn" id="cancelFormBtn">Annuller</button>
    </div>
  </div>
</div>

<!-- Redigerliste -->
<div class="modalBackdrop" id="manageModal">
  <div class="modal">
    <h2>Rediger personer</h2>
    <div id="manageList"></div>
    <button class="cancelBtn" id="closeManageBtn" style="width:100%;margin-top:14px;">Luk</button>
  </div>
</div>

<!-- Lukket modal -->
<div class="modalBackdrop" id="blockedModal">
  <div class="modal">
    <h2>Lukket</h2>
    <p style="text-align:center;color:rgba(255,255,255,.82);font-size:18px;">
      Denne person kan ikke ringes til i dette tidsrum.
    </p>
    <button class="saveBtn" id="closeBlockedBtn" style="width:100%;">OK</button>
  </div>
</div>

<script>
  document.addEventListener('gesturestart', e => e.preventDefault());
  document.addEventListener('gesturechange', e => e.preventDefault());
  document.addEventListener('gestureend', e => e.preventDefault());

  let lastTouchEnd = 0;
  document.addEventListener('touchend', function (e) {
    const now = Date.now();
    if (now - lastTouchEnd <= 300) e.preventDefault();
    lastTouchEnd = now;
  }, { passive:false });

  const STORAGE_KEY = "virtuelTelefonKontakterV1";

  const contactGrid = document.getElementById("contactGrid");

  const formModal = document.getElementById("formModal");
  const manageModal = document.getElementById("manageModal");
  const blockedModal = document.getElementById("blockedModal");

  const openAddBtn = document.getElementById("openAddBtn");
  const openManageBtn = document.getElementById("openManageBtn");
  const cancelFormBtn = document.getElementById("cancelFormBtn");
  const closeManageBtn = document.getElementById("closeManageBtn");
  const closeBlockedBtn = document.getElementById("closeBlockedBtn");

  const formTitle = document.getElementById("formTitle");
  const editId = document.getElementById("editId");
  const nameInput = document.getElementById("nameInput");
  const phoneInput = document.getElementById("phoneInput");
  const imageInput = document.getElementById("imageInput");
  const blockStartInput = document.getElementById("blockStartInput");
  const blockEndInput = document.getElementById("blockEndInput");
  const saveBtn = document.getElementById("saveBtn");
  const manageList = document.getElementById("manageList");

  let contacts = loadContacts();

  function loadContacts(){
    try{
      return JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];
    }catch(e){
      return [];
    }
  }

  function saveContacts(){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(contacts));
  }

  function makeId(){
    return Date.now().toString(36) + Math.random().toString(36).slice(2);
  }

  function parseHHMM(s){
    const parts = s.split(":").map(Number);
    return parts[0] * 60 + parts[1];
  }

  function minutesNow(){
    const d = new Date();
    return d.getHours() * 60 + d.getMinutes();
  }

  function isBlocked(contact){
    const start = parseHHMM(contact.blockStart);
    const end = parseHHMM(contact.blockEnd);
    const now = minutesNow();

    if(start === end) return true;

    if(start < end){
      return now >= start && now < end;
    }

    return now >= start || now < end;
  }

  function cleanPhone(phone){
    return phone.replace(/\s+/g, "");
  }

  function renderContacts(){
    contactGrid.innerHTML = "";

    if(contacts.length === 0){
      contactGrid.innerHTML = `
        <div class="empty">
          <h2>Ingen personer endnu</h2>
          <p>Tryk på “Opret person” for at tilføje den første.</p>
        </div>
      `;
      return;
    }

    contacts.forEach(contact => {
      const blocked = isBlocked(contact);

      const card = document.createElement("div");
      card.className = "card";

      const avatar = contact.image
        ? `<div class="avatar"><img src="${contact.image}" alt="${escapeHtml(contact.name)}"></div>`
        : `<div class="avatar">${escapeHtml(contact.name.charAt(0).toUpperCase())}</div>`;

      card.innerHTML = `
        ${avatar}
        <div>
          <p class="name">${escapeHtml(contact.name)}</p>
          <p class="phone">${escapeHtml(contact.phone)}</p>
          <div class="tag ${blocked ? "closed" : "open"}">
            ${blocked ? "LUKKET" : "RING"}
          </div>
        </div>
      `;

      card.addEventListener("click", () => {
        if(isBlocked(contact)){
          blockedModal.classList.add("show");
          return;
        }

        window.location.href = "tel:" + cleanPhone(contact.phone);
      });

      contactGrid.appendChild(card);
    });
  }

  function renderManageList(){
    manageList.innerHTML = "";

    if(contacts.length === 0){
      manageList.innerHTML = `<p style="text-align:center;color:rgba(255,255,255,.75);">Ingen personer oprettet endnu.</p>`;
      return;
    }

    contacts.forEach(contact => {
      const item = document.createElement("div");
      item.className = "listItem";

      item.innerHTML = `
        <div>
          <strong>${escapeHtml(contact.name)}</strong><br>
          <span style="color:rgba(255,255,255,.7);font-size:14px;">${escapeHtml(contact.phone)}</span>
        </div>
        <div style="display:flex;gap:6px;">
          <button class="smallBtn editBtn">Ret</button>
          <button class="smallBtn dangerBtn" style="margin:0;width:auto;">Slet</button>
        </div>
      `;

      item.querySelector(".editBtn").addEventListener("click", () => {
        manageModal.classList.remove("show");
        openEditForm(contact.id);
      });

      item.querySelector(".dangerBtn").addEventListener("click", () => {
        if(confirm("Vil du slette " + contact.name + "?")){
          contacts = contacts.filter(c => c.id !== contact.id);
          saveContacts();
          renderContacts();
          renderManageList();
        }
      });

      manageList.appendChild(item);
    });
  }

  function openNewForm(){
    formTitle.textContent = "Opret person";
    editId.value = "";
    nameInput.value = "";
    phoneInput.value = "";
    imageInput.value = "";
    blockStartInput.value = "22:00";
    blockEndInput.value = "08:00";
    formModal.classList.add("show");
  }

  function openEditForm(id){
    const contact = contacts.find(c => c.id === id);
    if(!contact) return;

    formTitle.textContent = "Rediger person";
    editId.value = contact.id;
    nameInput.value = contact.name;
    phoneInput.value = contact.phone;
    imageInput.value = "";
    blockStartInput.value = contact.blockStart;
    blockEndInput.value = contact.blockEnd;
    formModal.classList.add("show");
  }

  function closeForm(){
    formModal.classList.remove("show");
  }

  function readImageAsDataUrl(file){
    return new Promise((resolve, reject) => {
      if(!file){
        resolve(null);
        return;
      }

      const reader = new FileReader();

      reader.onload = () => resolve(reader.result);
      reader.onerror = () => reject(reader.error);

      reader.readAsDataURL(file);
    });
  }

  async function saveForm(){
    const name = nameInput.value.trim();
    const phone = phoneInput.value.trim();
    const blockStart = blockStartInput.value;
    const blockEnd = blockEndInput.value;
    const id = editId.value;

    if(!name){
      alert("Skriv et navn.");
      return;
    }

    if(!phone){
      alert("Skriv et telefonnummer.");
      return;
    }

    const file = imageInput.files[0];
    const newImage = await readImageAsDataUrl(file);

    if(id){
      const contact = contacts.find(c => c.id === id);
      if(!contact) return;

      contact.name = name;
      contact.phone = phone;
      contact.blockStart = blockStart;
      contact.blockEnd = blockEnd;

      if(newImage){
        contact.image = newImage;
      }
    }else{
      contacts.push({
        id: makeId(),
        name,
        phone,
        image: newImage,
        blockStart,
        blockEnd
      });
    }

    saveContacts();
    renderContacts();
    closeForm();
  }

  function escapeHtml(str){
    return String(str).replace(/[&<>"']/g, function(m){
      return ({
        "&":"&amp;",
        "<":"&lt;",
        ">":"&gt;",
        '"':"&quot;",
        "'":"&#039;"
      })[m];
    });
  }

  openAddBtn.addEventListener("click", openNewForm);

  openManageBtn.addEventListener("click", () => {
    renderManageList();
    manageModal.classList.add("show");
  });

  cancelFormBtn.addEventListener("click", closeForm);
  saveBtn.addEventListener("click", saveForm);

  closeManageBtn.addEventListener("click", () => {
    manageModal.classList.remove("show");
  });

  closeBlockedBtn.addEventListener("click", () => {
    blockedModal.classList.remove("show");
  });

  renderContacts();
  setInterval(renderContacts, 15000);
</script>
</body>
</html>
